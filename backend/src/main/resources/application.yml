spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accounting_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false # Temporarily disabled for rapid MVP development; we'll rely on hibernate auto-update

server:
  port: 8080
