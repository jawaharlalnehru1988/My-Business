version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: accounting_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M

  service-registry:
    build:
      context: ./service-registry
    environment:
      - JAVA_OPTS=-Xms128m -Xmx192m
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
      - kafka
      - service-registry
    environment:
      - JAVA_OPTS=-Xms256m -Xmx384m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/accounting_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SERVER_PORT=8090
    deploy:
      resources:
        limits:
          memory: 512M

  accounting-service:
    build:
      context: ./accounting-service
    depends_on:
      - kafka
      - service-registry
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 384M

  inventory-service:
    build:
      context: ./inventory-service
    depends_on:
      - kafka
      - service-registry
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 384M

  auth-service:
    build:
      context: ./auth-service
    depends_on:
      - service-registry
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 384M

  api-gateway:
    build:
      context: ./api-gateway
    depends_on:
      - service-registry
    ports:
      - "8089:8080"
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 384M

  reporting-service:
    build:
      context: ./reporting-service
    depends_on:
      - service-registry
      - backend
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 384M

  notification-service:
    build:
      context: ./notification-service
    depends_on:
      - service-registry
      - kafka
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    deploy:
      resources:
        limits:
          memory: 384M

  frontend:
    build:
      context: ./react-frontend
    ports:
      - "8088:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
