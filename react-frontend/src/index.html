    <!--
      Content Security Policy. Defends the rich-text Terms / Notes / extra-section
      paths which inject sanitized HTML via DOMPurify. Even if the sanitizer config
      is ever loosened, the CSP locks scripts to same-origin so injected script
      tags can't execute, and connect-src is limited to localhost + Google
      services (only place we make outbound calls).
    -->
    <!--
      v1.10.33 — Tesseract assets now bundled into public/tesseract/ by
      scripts/bundle-tesseract-assets.mjs. That means:
        - script-src no longer needs https://cdn.jsdelivr.net (worker
          serves from same-origin)
        - connect-src no longer needs jsdelivr or tessdata.projectnaptha
          (traineddata + core WASM serve from same-origin)
      What STAYS wide:
        - 'wasm-unsafe-eval' in script-src → tesseract-core compiles a
          WebAssembly module, which requires this outside of a fresh
          instantiation flow
        - worker-src 'self' blob: → tesseract creates its worker from a
          blob URL. Without an explicit worker-src, it falls back to
          script-src (which excludes blob:) and blocks the worker.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'wasm-unsafe-eval' https://accounts.google.com https://apis.google.com;
      worker-src  'self' blob:;
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com data:;
      img-src     'self' data: blob: https://*.googleusercontent.com;
      connect-src 'self' http://localhost:* https://accounts.google.com https://www.googleapis.com https://api.github.com https://nodejs.org https://raw.githubusercontent.com;
      frame-src   https://accounts.google.com;
      object-src  'none';
      base-uri    'self';
    " />
